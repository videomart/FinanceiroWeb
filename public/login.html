<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMoney - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      padding: 40px 32px;
      text-align: center;
    }
    .login-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .login-subtitle {
      color: var(--text-secondary);
      font-size: .9rem;
      margin-bottom: 32px;
    }
    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, box-shadow .2s;
      text-decoration: none;
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
    }
    .login-error {
      background: #f8d7da;
      color: #721c24;
      padding: 10px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: .875rem;
      display: none;
    }
    .login-error.visible {
      display: block;
    }
    .login-info {
      margin-top: 24px;
      font-size: .8rem;
      color: var(--text-secondary);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-secondary);
      font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }
    .dev-btn {
      width: 100%;
      padding: 10px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-secondary);
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .dev-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0f6ff;
    }
    .dev-btn:disabled {
      opacity: .5;
      cursor: wait;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">EasyMoney</div>
      <p class="login-subtitle">Sistema de Controle Financeiro</p>

      <div class="login-error" id="loginError">
        Falha na autenticação. Tente novamente.
      </div>

      <a href="/auth/google" class="google-btn">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Entrar com Google
      </a>

      <div class="divider">ou</div>

      <button class="dev-btn" id="devLoginBtn" onclick="devLogin()">
        Entrar em Modo Desenvolvimento
      </button>

      <p class="login-info">
        Acesse com sua conta Google ou use o modo desenvolvimento para testes.
      </p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const el = document.getElementById('loginError');
      el.textContent = decodeURIComponent(error);
      el.classList.add('visible');
    }

    async function devLogin() {
      const btn = document.getElementById('devLoginBtn');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      try {
        const res = await fetch('/auth/dev-login', { method: 'POST' });
        if (res.ok) {
          window.location.href = '/';
        } else {
          alert('Erro ao entrar em modo desenvolvimento.');
          btn.disabled = false;
          btn.textContent = 'Entrar em Modo Desenvolvimento';
        }
      } catch (e) {
        alert('Erro de conexão.');
        btn.disabled = false;
        btn.textContent = 'Entrar em Modo Desenvolvimento';
      }
    }
  </script>
</body>
</html>
